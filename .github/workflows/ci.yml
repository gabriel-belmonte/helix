name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - name: Install Bun
        run: curl -fsSL https://bun.sh/install | bash
      - name: Add Bun to PATH
        run: echo "$HOME/.bun/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: bun install
      # Build all packages (incl. the web dashboard, which needs the Rollup
      # native binary for this platform — declared in helix-web optionalDeps).
      - name: Build
        run: bunx turbo run build
      # Run tests. The docs site (helix-site) has no tests and a heavy Astro
      # build, so it is excluded from the test graph to keep CI fast.
      - name: Test
        run: bunx turbo run test --filter='!helix-site'
