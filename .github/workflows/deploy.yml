name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "packages/site/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Use Bun (not npm): the monorepo root uses the `workspace:*` protocol,
      # which npm does not understand (EUNSUPPORTEDPROTOCOL). Bun resolves the
      # local helix-* packages and the Rollup native binaries correctly.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies (workspace root)
        run: bun install
      - name: Build site
        working-directory: packages/site
        run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: packages/site/dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
