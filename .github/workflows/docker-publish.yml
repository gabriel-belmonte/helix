name: Publish sandbox Docker image

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "❌ Tag ${{ github.ref_name }} is NOT on main branch."
            exit 1
          fi
          echo "✅ Tag on main — proceeding."

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (sandbox)
        id: meta-sbx
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/helix-sandbox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push (sandbox)
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile.sandbox
          push: true
          tags: ${{ steps.meta-sbx.outputs.tags }}
          labels: ${{ steps.meta-sbx.outputs.labels }}
