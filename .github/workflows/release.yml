name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Ensure tag is on main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "❌ Tag ${{ github.ref_name }} is NOT on main branch."
            echo "   Tags for releases must point to commits on main."
            echo "   Push from dev is not allowed."
            exit 1
          fi
          echo "✅ Tag ${{ github.ref_name }} is on main — proceeding."
      # Use Bun (not npm): the monorepo root uses the `workspace:*` protocol,
      # which npm does not understand (EUNSUPPORTEDPROTOCOL). Bun resolves the
      # local helix-* packages and the Rollup native binaries correctly.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      # Build the CLI and every package it depends on (agent, core, mcp, eval).
      - name: Build packages
        run: bunx turbo run build --filter=helix-agent-cli...
      - name: Compile binaries
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Building $VERSION..."
          # Embed the version so `--version` works inside the standalone binary.
          printf 'export const BUILD_VERSION: string = "%s";\n' "$VERSION" > packages/cli/src/version.generated.ts
          mkdir -p dist
          # Single unified binary: CLI + TUI + Dashboard all in one.
          bun build packages/cli/cli.ts --compile --target=bun-linux-aarch64  --outfile=dist/helix-linux-aarch64
          bun build packages/cli/cli.ts --compile --target=bun-linux-x64      --outfile=dist/helix-linux-x64
          bun build packages/cli/cli.ts --compile --target=bun-darwin-aarch64 --outfile=dist/helix-darwin-aarch64
          bun build packages/cli/cli.ts --compile --target=bun-darwin-x64     --outfile=dist/helix-darwin-x64
          bun build packages/cli/cli.ts --compile --target=bun-windows-x64    --outfile=dist/helix-windows-x64.exe
      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -2 | tail -1)
          [ -z "$PREV_TAG" ] && PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          {
            echo "### What's changed in ${VERSION}"
            echo ""
            git log --oneline "$PREV_TAG..HEAD" --no-decorate --format="* %s" \
              | grep -v "^.*chore: save work from" \
              | grep -v "^.*Merge branch " \
              | grep -v "^.*Merge remote-tracking" \
              | sed 's/^/  /' || true
            echo ""
            echo "📦 **Install:** \`curl -fsSL https://raw.githubusercontent.com/gabriel-belmonte/helix/main/packages/cli/install.sh | sh\`"
            echo ""
            echo "**Full changelog:** [\`$PREV_TAG..${VERSION}\`](https://github.com/gabriel-belmonte/helix/compare/$PREV_TAG...${VERSION})"
          } > /tmp/changelog.md
          cat /tmp/changelog.md
          # Output for GITHUB_OUTPUT
          {
            echo "changelog<<EOF"
            cat /tmp/changelog.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          gh release create "$VERSION" \
            --title "Helix Agent $VERSION" \
            --notes "${{ steps.changelog.outputs.changelog }}" \
            dist/helix-linux-aarch64 \
            dist/helix-linux-x64 \
            dist/helix-darwin-aarch64 \
            dist/helix-darwin-x64 \
            dist/helix-windows-x64.exe \
            packages/cli/install.sh
