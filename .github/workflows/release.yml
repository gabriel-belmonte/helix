name: Release CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: npm ci

      - name: Build engine
        run: npm run build:agent

      - name: Compile binaries
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "Building $VERSION..."
          mkdir -p dist
          bun build packages/cli/cli.ts --compile --target=bun-linux-aarch64  --outfile=dist/helix-linux-aarch64
          bun build packages/cli/cli.ts --compile --target=bun-linux-x64      --outfile=dist/helix-linux-x64
          bun build packages/cli/cli.ts --compile --target=bun-darwin-aarch64 --outfile=dist/helix-darwin-aarch64
          bun build packages/cli/cli.ts --compile --target=bun-darwin-x64     --outfile=dist/helix-darwin-x64

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          gh release create "$VERSION" \
            --title "Helix Agent CLI $VERSION" \
            --notes "Native binaries. Install: curl -fsSL https://raw.githubusercontent.com/gabriel-belmonte/helix/main/packages/cli/install.sh | sh" \
            dist/helix-linux-aarch64 \
            dist/helix-linux-x64 \
            dist/helix-darwin-aarch64 \
            dist/helix-darwin-x64 \
            packages/cli/install.sh
